<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ascii Art Stylize</title>
  <link rel="stylesheet" href="/web/style.css">
</head>
<body>
  <section class="form-content">
    <main>
      <section class="form">
        <h1>Text to ASCII Art Generator: Create ASCII Art from Text</h1>
        <form action="/" method="POST">
          <div class="form-input">
            <div>
              <p>ASCII Art font:</p>
              <select name="font" id="font">
                <option value="--">---</option>
                <option value="standard">Standard</option>
                <option value="shadow">Shadow</option>
                <option value="thinkertoy">Thinkertoy</option>
              </select>
            </div>
            <button id="submit" type="submit">Submit</button>
          </div>

          <div>
            <p>Input text:</p>
            <textarea name="input" id="input" placeholder="Type Something"></textarea>
          </div>
        </form>
      </section>
    </main>

  </section>

  <article class="art">
    <div id="art-action">
      <button onclick="handleCopy(`{{ . }}`)" class="custom-button">
        Copy <img src="/web/images/paste.png" alt="Copy icon" />
      </button>

      <button onclick="handleDownload(`{{ . }}`)" class="custom-button">
        Download<img src="/web/images/inbox.png" alt="Download icon">
      </button>
    </div>
    <pre>{{ . }}</pre>
  </article>
  <script src="/web/index.js"></script>
</body>
</html>
